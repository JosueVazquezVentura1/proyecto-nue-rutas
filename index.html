<!-- SECCIÓN DE RESULTADOS -->
<div class="container" style="margin-top: 50px;">
    <h1 style="text-align: center; color: #2c3e50;">📊 Resultados de la Encuesta</h1>
    
    <div style="text-align: center; margin: 20px 0;">
        <button id="btnResultados" class="btn-submit" style="width: auto; padding: 15px 40px; background: #3498db;">
            Ver Resultados
        </button>
    </div>
    
    <div id="seccionResultados" style="display: none;">
        <!-- Estadísticas Generales -->
        <div class="section">
            <h2>📈 Estadísticas Generales</h2>
            <div id="estadisticas" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <!-- Se llena con JavaScript -->
            </div>
        </div>
        
        <!-- Tabla de Resultados -->
        <div class="section">
            <h2>📋 Respuestas Registradas</h2>
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; margin-top: 15px;">
                    <thead>
                        <tr style="background: #3498db; color: white;">
                            <th style="padding: 12px; border: 1px solid #ddd;">ID</th>
                            <th style="padding: 12px; border: 1px solid #ddd;">Fecha</th>
                            <th style="padding: 12px; border: 1px solid #ddd;">Voto</th>
                            <th style="padding: 12px; border: 1px solid #ddd;">Proyecto</th>
                            <th style="padding: 12px; border: 1px solid #ddd;">Estado</th>
                            <th style="padding: 12px; border: 1px solid #ddd;">Necesidad</th>
                        </tr>
                    </thead>
                    <tbody id="tablaResultados">
                        <!-- Se llena con JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// Script para cargar resultados
document.getElementById('btnResultados').addEventListener('click', async function() {
    const seccion = document.getElementById('seccionResultados');
    const tbody = document.getElementById('tablaResultados');
    const estadisticasDiv = document.getElementById('estadisticas');
    
    try {
        const respuesta = await fetch('resultados.php');
        const datos = await respuesta.json();
        
        if (datos.success) {
            // Mostrar estadísticas
            const stats = datos.estadisticas;
            estadisticasDiv.innerHTML = `
                <div style="background: #3498db; color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>Total de Respuestas</h3>
                    <p style="font-size: 2em; margin: 10px 0;">${stats.total || 0}</p>
                </div>
                <div style="background: #27ae60; color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>Totalmente de Acuerdo</h3>
                    <p style="font-size: 2em; margin: 10px 0;">${stats.si_total || 0}</p>
                </div>
                <div style="background: #f39c12; color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>Parcialmente de Acuerdo</h3>
                    <p style="font-size: 2em; margin: 10px 0;">${stats.si_parcial || 0}</p>
                </div>
                <div style="background: #e74c3c; color: white; padding: 20px; border-radius: 8px; text-align: center;">
                    <h3>En Desacuerdo</h3>
                    <p style="font-size: 2em; margin: 10px 0;">${stats.no_total || 0}</p>
                </div>
            `;
            
            // Llenar tabla
            tbody.innerHTML = '';
            datos.resultados.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="padding: 10px; border: 1px solid #ddd;">${row.id}</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">${new Date(row.respondido_en).toLocaleString()}</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">${row.voto_principal}</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">${row.nombre_proyecto}</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">${row.estado}</td>
                    <td style="padding: 10px; border: 1px solid #ddd;">${row.nivel_necesidad}/5</td>
                `;
                tbody.appendChild(tr);
            });
            
            // Mostrar sección
            seccion.style.display = 'block';
            seccion.scrollIntoView({ behavior: 'smooth' });
        } else {
            alert('Error al cargar resultados');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error de conexión al cargar resultados');
    }
});
</script>
